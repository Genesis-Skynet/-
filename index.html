.aftersale-card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);min-width:280px}

.aftersale-card-header{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--gray-50);border-bottom:1px solid var(--gray-100)}

.aftersale-card-title{font-size:12px;font-weight:600;color:var(--gray-800)}

.aftersale-card-submit-btn{padding:3px 10px;background:#dcfce7;color:var(--success);border:none;border-radius:10px;font-size:10px;font-weight:600;cursor:pointer;transition:all 0.15s ease}

.aftersale-card-submit-btn:hover{background:var(--success);color:#fff}

.aftersale-product{display:flex;gap:8px;padding:8px 10px;border-bottom:1px dashed var(--gray-100)}

.product-images{display:flex;gap:2px;flex-shrink:0}

.product-image{width:40px;height:40px;border-radius:4px;object-fit:cover;border:1px solid var(--gray-100)}

.product-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}

.product-title{font-size:11px;color:var(--gray-800);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.product-meta{font-size:10px;color:var(--gray-500);margin-top:2px}

.aftersale-details{padding:8px 10px;display:flex;flex-direction:column;gap:5px}

.aftersale-row{display:flex;justify-content:space-between;align-items:center}

.aftersale-label{font-size:10px;color:var(--gray-500)}

.aftersale-value{font-size:10px;color:var(--gray-800);font-weight:500;text-align:right;max-width:65%;word-break:break-word}

.aftersale-card-footer{padding:8px 10px;display:flex;justify-content:flex-end;border-top:1px solid var(--gray-100)}

.aftersale-cancel-btn{padding:4px 12px;background:var(--gray-100);color:var(--gray-500);border:none;border-radius:4px;font-size:10px;cursor:pointer;transition:all 0.15s ease}

.aftersale-cancel-btn:hover{background:var(--gray-200);color:var(--gray-700)}

/* 售后卡片消息样式 - 独立于消息气泡 */
.message-aftersale {
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 90%;
  width: 100%;
  gap: 6px;
}

.aftersale-card-wrapper {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.aftersale-card-time {
  font-size: 10px;
  color: var(--gray-400);
  margin-top: 4px;
  align-self: flex-end;
}

@media (max-width: 1024px) {
  .main-container {
    flex-direction: column;
  }
  
  .left-panel {
    width: 100% !important;
    min-width: unset !important;
    max-width: 100% !important;
    height: auto;
    border-right: none;
    border-bottom: 1px solid var(--gray-200);
  }
  
  .right-content {
    width: 100%;
  }
  
  .chat-container {
    flex-direction: column;
  }
  
  .order-panel {
    width: 100% !important;
    min-width: unset !important;
    max-height: 300px;
    border-top: 1px solid var(--gray-200);
    border-left: none;
  }
  
  .chat-resizer {
    display: none;
  }
  
  .tab-nav {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  
  .tab-nav::-webkit-scrollbar {
    display: none;
  }
}

@media (max-width: 768px) {
  .top-bar {
    padding: 0 12px;
    height: auto;
    flex-wrap: wrap;
    gap: 8px;
    padding-top: 8px;
    padding-bottom: 8px;
  }
  
  .brand {
    width: 100%;
    justify-content: center;
  }
  
  .tab-nav {
    width: 100%;
    order: 3;
  }

document.addEventListener('DOMContentLoaded', function() {
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      const focusedElement = document.activeElement;
      if (focusedElement && focusedElement.classList.contains('tab-btn')) {
        const tabButtons = Array.from(document.querySelectorAll('.tab-btn'));
        const currentIndex = tabButtons.indexOf(focusedElement);
        let nextIndex;
        
        if (e.shiftKey) {
          nextIndex = currentIndex > 0 ? currentIndex - 1 : tabButtons.length - 1;
        } else {
          nextIndex = currentIndex < tabButtons.length - 1 ? currentIndex + 1 : 0;
        }
        
        tabButtons[nextIndex].focus();
        e.preventDefault();
      }
    }
    
    if (e.key === 'Enter' && e.ctrlKey) {
      const sendBtn = document.getElementById('sendBtn');
      if (sendBtn && !sendBtn.disabled) {
        sendMessage();
        e.preventDefault();
      }
    }
  });
  
  document.querySelectorAll('button, input, textarea').forEach(function(element) {
    element.addEventListener('focus', function() {
      this.style.outline = '2px solid var(--primary)';
      this.style.outlineOffset = '2px';
    });
    
    element.addEventListener('blur', function() {
      this.style.outline = '';

/**
 * 初始化可拖拽分隔条功能
 */
function initResizer() {
  const resizer = document.getElementById('chatResizer');
  const chatMain = document.querySelector('.chat-main');
  const orderPanel = document.querySelector('.order-panel');
  
  if (!resizer || !chatMain || !orderPanel) return;
  
  let isDragging = false;
  
  function startDrag(e) {
    isDragging = true;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    
    e.preventDefault();
  }
  
  function drag(e) {
    if (!isDragging) return;
    
    const chatContainer = document.querySelector('.chat-container');
    if (!chatContainer) return;
    
    const containerRect = chatContainer.getBoundingClientRect();
    let newOrderWidth = containerRect.right - e.clientX;
    
    // 设置最小和最大宽度
    const minWidth = 200;
    const maxWidth = containerRect.width - 200;
    
    if (newOrderWidth < minWidth) {
      newOrderWidth = minWidth;
    } else if (newOrderWidth > maxWidth) {
      newOrderWidth = maxWidth;
    }
    
    orderPanel.style.width = newOrderWidth + 'px';
    orderPanel.style.minWidth = newOrderWidth + 'px';
  }
  
  function endDrag() {
    if (!isDragging) return;
    
    isDragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
  
  // 鼠标事件
  resizer.addEventListener('mousedown', startDrag);
  document.addEventListener('mousemove', drag);
  document.addEventListener('mouseup', endDrag);
  
  // 触摸事件
  resizer.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    startDrag(touch);
  });
  
  document.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    drag(touch);
  });
  
  document.addEventListener('touchend', endDrag);
}

// 页面加载完成后初始化

/**
 * 将文本转换为二元组数组
 * @param {string} text - 输入文本
 * @returns {Array} 二元组数组
 */
function textToBigrams(text) {
  const cleanedText = text.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '');
  const bigrams = [];
  for (let i = 0; i < cleanedText.length - 1; i++) {
    bigrams.push(cleanedText.substring(i, i + 2));
  }
  if (cleanedText.length === 1) {
    bigrams.push(cleanedText);
  }
  return bigrams;
}

/**
 * 计算二元组频率
 * @param {Array} bigrams - 二元组数组
 * @returns {Object} 二元组频率对象
 */
function calculateBigramFrequency(bigrams) {
  const frequency = {};
  bigrams.forEach(bigram => {
    frequency[bigram] = (frequency[bigram] || 0) + 1;
  });
  return frequency;
}

/**
 * 计算两个文本的余弦相似度
 * @param {string} text1 - 第一个文本
 * @param {string} text2 - 第二个文本
 * @returns {number} 余弦相似度值
 */
function calculateCosineSimilarity(text1, text2) {
  const bigrams1 = textToBigrams(text1);
  const bigrams2 = textToBigrams(text2);
  
  if (!bigrams1.length || !bigrams2.length) return 0;
  
  const frequency1 = calculateBigramFrequency(bigrams1);
  const frequency2 = calculateBigramFrequency(bigrams2);
  
  const allBigrams = new Set([...Object.keys(frequency1), ...Object.keys(frequency2)]);
  let dotProduct = 0;
  let magnitude1 = 0;
  let magnitude2 = 0;
  
  allBigrams.forEach(bigram => {
    const value1 = frequency1[bigram] || 0;
    const value2 = frequency2[bigram] || 0;
    dotProduct += value1 * value2;
    magnitude1 += value1 * value1;
    magnitude2 += value2 * value2;
  });
  
  const sqrtMagnitude1 = Math.sqrt(magnitude1);
  const sqrtMagnitude2 = Math.sqrt(magnitude2);
  
  return (sqrtMagnitude1 && sqrtMagnitude2) ? dotProduct / (sqrtMagnitude1 * sqrtMagnitude2) : 0;
}

/**
 * 计算文本与答案数组的最大相似度
 * @param {string} response - 客服回复
 * @param {Array} answers - 标准答案数组
 * @returns {number} 最大相似度值
 */
function calculateMaxSimilarity(response, answers) {
  let maxSimilarity = 0;
  answers.forEach(answer => {
    const similarity = calculateCosineSimilarity(response, answer);
    if (similarity > maxSimilarity) {
      maxSimilarity = similarity;
    }
  });
  return maxSimilarity;
}

/**
 * 计算关键词命中率
 * @param {string} response - 客服回复
 * @param {Array} keywords - 关键词数组
 * @returns {number} 命中率
 */
function calculateKeywordHitRate(response, keywords) {
  if (!keywords || !keywords.length) return 1;
  let hitCount = 0;
  keywords.forEach(keyword => {
    if (response.includes(keyword)) {
      hitCount++;
    }
  });
  return hitCount / keywords.length;
}

/**
 * 检查回复是否合格
 * @param {string} response - 客服回复
 * @param {Array} keywords - 关键词数组
 * @param {Array} standardAnswers - 标准答案数组
 * @returns {Object} 检查结果
 */
function checkResponseQuality(response, keywords, standardAnswers, answerBanks = null) {
  const keywordHitRate = calculateKeywordHitRate(response, keywords);
  const similarity = calculateMaxSimilarity(response, standardAnswers);
  
  // 检测命中哪个答案库
  let hitAnswerBank = null;
  if (answerBanks && answerBanks.length > 0) {
    answerBanks.forEach((bank, index) => {
      const bankSimilarity = calculateMaxSimilarity(response, bank);
      if (bankSimilarity >= 0.5) {
        hitAnswerBank = index + 1; // 返回1、2、3
      }
    });
  }
  
  if (similarity >= 0.6) {
    return { pass: true, keywordHitRate, similarity, hitAnswerBank };
  }
  if (keywordHitRate >= 0.2 && similarity >= 0.25) {
    return { pass: true, keywordHitRate, similarity, hitAnswerBank };
  }
  return { pass: false, keywordHitRate, similarity, hitAnswerBank };
}

/**

const contradictoryPhrases = [
  { pos: ['保暖','暖和','锁温'], neg: ['不保暖','不暖和','没用'] },
  { pos: ['抱歉','理解','处理'], neg: ['不关我事','管不了','活该'] },

];

/**
 * 检查回复是否存在矛盾话术
 * @param {string} response - 客服回复
 * @param {Array} standardAnswers - 标准答案数组
 * @returns {boolean} 是否存在矛盾话术
 */
function checkContradictoryLanguage(response, standardAnswers) {
  for (const pattern of contradictoryPhrases) {
    if (pattern.neg.some(negative => response.includes(negative)) && 
        standardAnswers.some(answer => pattern.pos.some(positive => answer.includes(positive)))) {
      return true;
    }
  }
  return false;
}

/**
 * 获取当前时间
 * @returns {string} 当前时间字符串
 */
function getCurrentTime() {
  return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

/**
 * 获取情绪文本
 * @param {string} emotion - 情绪类型
 * @returns {string} 情绪文本
 */
function getEmotionText(emotion) {
  return {
    calm: '😊平静',
    concerned: '😟担忧',
    upset: '😤不满',
    angry: '😡愤怒',
    extreme: '🤬极度愤怒'
  }[emotion] || '';
}

/**
 * 系统状态
 */
let systemState = {
  on: false,           // 测试是否开始
  end: false,          // 测试是否结束
  startTime: null,     // 开始时间
  endTime: null,       // 结束时间
  agentName: '刘亮',    // 客服姓名
  currentCustomers: [], // 当前在线客户
  activeCustomer: null, // 当前活动客户
  customerStates: {},   // 客户状态
  completedCustomers: [], // 已完成客户
  nextCustomerIndex: 0, // 下一个客户索引
  totalScore: 100,     // 总分
  violations: [],       // 违规记录
  scoringModules: JSON.parse(JSON.stringify(scoringModules)), // 评分模块
  steps: [],           // 流程步骤
  transferTimers: {}    // 转接计时器
};
/**
 * 切换标签页
 * @param {string} tabName - 标签页名称
 * @param {HTMLElement} button - 点击的按钮元素
 */
function switchTab(tabName, button) {
  document.querySelectorAll('.tab-page').forEach(page => page.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('tab' + tabName.charAt(0).toUpperCase() + tabName.slice(1))?.classList.add('active');
  if (button) {
    button.classList.add('active');
  } else {
    document.querySelector(`.tab-btn[onclick*="${tabName}"]`)?.classList.add('active');
  }
  if (tabName === 'scoring') updateScoringPage();
  if (tabName === 'process') updateProcessPage();
  if (tabName === 'report') updateReportPage();
}

/**
 * 初始化客户列表
 */
function initCustomerList() {
  const list = document.getElementById('customerList');
  list.innerHTML = '';
  customers.forEach(customer => {
    const item = document.createElement('div');
    item.className = 'customer-item hidden-customer';
    item.id = `customer-${customer.id}`;
    item.onclick = () => switchToCustomer(customer.id);
    item.innerHTML = `
      <div class="customer-avatar" style="background:${customer.bgColor}">${customer.avatar}</div>
      <div class="online-dot"></div>
      <div class="customer-info">
        <div class="customer-name">${customer.name}</div>
        <div class="customer-scene">${customer.scene}</div>
        <div class="customer-time" id="customer-time-${customer.id}">进线时间：-</div>
      </div>
      <span class="customer-status status-waiting">等待</span>
    `;
    list.appendChild(item);
  });
  updateCustomerListEmptyState();
}

/**
 * 更新客户列表空状态
 */
function updateCustomerListEmptyState() {
  document.getElementById('customerListEmpty').style.display = 
    document.querySelectorAll('.customer-item:not(.hidden-customer)').length > 0 ? 'none' : 'block';
}

/**
 * 更新聊天头部信息
 * @param {number} customerId - 客户ID
 */
function updateChatHeader(customerId) {
  const header = document.getElementById('chatHeaderLeft');
  if (!customerId) {
    header.innerHTML = '<span class="chat-header-placeholder">请选择客户开始对话</span>';
    return;
  }
  const customer = customers.find(c => c.id === customerId);
  if (!customer) return;
  const customerState = systemState.customerStates[customerId];
  const status = customerState?.completed ? '已完成' : '在线';
  const statusColor = customerState?.completed ? 'var(--gray-400)' : 'var(--success)';
  header.innerHTML = `
    <div style="width:40px;height:40px;border-radius:50%;background:${customer.bgColor};display:flex;align-items:center;justify-content:center;font-size:18px">${customer.avatar}</div>
    <div>
      <div style="font-size:14px;font-weight:600">${customer.name}</div>
      <div style="font-size:11px;color:var(--gray-500);margin-top:2px">
        <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${statusColor};margin-right:4px;vertical-align:middle"></span>
        ${status} · ${customer.scene}
      </div>
    </div>
  `;
}
/**
 * 开始测试
 */
function startTest() {
  systemState.on = true;
  systemState.startTime = new Date();
  systemState.agentName = document.getElementById('agentName').value || '刘亮';
  document.getElementById('agentName').disabled = true;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('configSection').style.display = 'none';
  document.getElementById('welcomeOverlay').style.display = 'none';
  document.getElementById('chatInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('transferBtn').disabled = false;
  
  customers.forEach(customer => {
    systemState.customerStates[customer.id] = {
      dialogueIndex: 0,
      completed: false,
      messages: [],
      transferred: false,
      awaitTransfer: false,
      lastPass: true
    };
  });
  
  bringCustomers(2);
  addStep('测试启动', `被测：${systemState.agentName}`, 'done');
  updateProgress();
}

/**
 * 引入客户
 * @param {number} count - 引入客户数量
 */
function bringCustomers(count) {
  for (let i = 0; i < count && systemState.nextCustomerIndex < customers.length; i++) {
    const customer = customers[systemState.nextCustomerIndex];
    systemState.currentCustomers.push(customer.id);
    systemState.nextCustomerIndex++;
    
    const element = document.getElementById(`customer-${customer.id}`);
    if (element) {
      element.classList.remove('hidden-customer');
      element.querySelector('.customer-status').className = 'customer-status status-active';
      element.querySelector('.customer-status').textContent = '在线';
      // 记录并显示进线时间
      const currentTime = getCurrentTime();
      const timeElement = document.getElementById(`customer-time-${customer.id}`);
      if (timeElement) {
        timeElement.textContent = `进线时间：${currentTime}`;
      }
    }
    
    setTimeout(() => sendCustomerDialogue(customer.id), 800 + i * 1200);
  }
  
  if (systemState.currentCustomers.length > 0 && !systemState.activeCustomer) {
    switchToCustomer(systemState.currentCustomers[0]);
  }
  
  updateCustomerListEmptyState();
}

/**
 * 切换到指定客户
 * @param {number} customerId - 客户ID
 */
function switchToCustomer(customerId) {
  if (!systemState.on) return;
  
  const customerState = systemState.customerStates[customerId];
  if (!customerState) return;
  
  systemState.activeCustomer = customerId;
  document.querySelectorAll('.customer-item').forEach(item => item.classList.remove('active'));
  document.getElementById(`customer-${customerId}`)?.classList.add('active');
  
  renderMessages(customerId);
  updateOrderPanel(customerId);
  updateChatHeader(customerId);
  
  const transferButton = document.getElementById('transferBtn');
  transferButton.classList.remove('pulse');
  if (customerState.awaitTransfer) {
    transferButton.classList.add('pulse');
  }
  
  document.getElementById('chatInput').disabled = customerState.completed || systemState.end;
  document.getElementById('sendBtn').disabled = customerState.completed || systemState.end;
}

/**
 * 渲染消息列表
 * @param {number} customerId - 客户ID
 */
function renderMessages(customerId) {
  const element = document.getElementById('chatMessages');
  element.innerHTML = '';
  (systemState.customerStates[customerId]?.messages || []).forEach(message => {
    addMessage(message, false);
  });
  scrollToBottom();
}
/**
 * 添加消息到聊天界面
 * @param {Object} message - 消息对象
 * @param {boolean} animate - 是否添加动画效果
 */
function addMessage(message, animate = true) {
  const element = document.getElementById('chatMessages');
  const messageElement = document.createElement('div');
  
  if (!animate) {
    messageElement.style.animation = 'none';
  }
  
  if (message.type === 'system') {
    messageElement.className = 'message message-system';
    messageElement.innerHTML = `<div class="msg-content"><div class="msg-bubble">${message.text}</div></div>`;
  } else if (message.type === 'customer') {
    messageElement.className = 'message message-customer';
    messageElement.innerHTML = `
      <div class="msg-avatar">${message.avatar || '👩'}</div>
      <div class="msg-content">
        <div class="msg-name">${message.name}${message.emotion ? ' · ' + getEmotionText(message.emotion) : ''}</div>
        <div class="msg-bubble">${message.text}</div>
        <div class="msg-time">${message.time}</div>
      </div>
    `;
  } else if (message.type === 'agent') {
    let tag = '';
    if (message.pen > 0) {
      tag = `<div class="msg-penalty">⚠️ -${message.pen}分 ${message.pr || ''}</div>`;
    }
    if (message.ab) {
      tag += `<div class="msg-penalty">🚫 违规</div>`;
    }
    messageElement.className = 'message message-agent';
    messageElement.innerHTML = `
      <div class="msg-avatar">👨‍💻</div>
      <div class="msg-content">
        <div class="msg-name">${systemState.agentName}·客服</div>
        <div class="msg-bubble">${message.text}</div>
        ${tag}
        <div class="msg-time">${message.time}</div>
      </div>
    `;
  } else if (message.type === 'transfer') {
    messageElement.className = 'message message-system';
    messageElement.innerHTML = `<div class="msg-content"><div class="msg-bubble">🔀 ${message.text}</div></div>`;
  } else if (message.type === 'aftersale') {
    messageElement.className = 'message message-aftersale';
    const card = message.card;
    messageElement.innerHTML = `
      <div class="aftersale-card-wrapper">
        <div class="aftersale-card">
          <div class="aftersale-card-header">
            <span class="aftersale-card-title">代用户预填写售后申请</span>
            <button class="aftersale-card-submit-btn" onclick="confirmAfterSale('${message.cardId}')">用户直接提交</button>
          </div>
          <div class="aftersale-product">
            <div class="product-images">
              ${card.images.map(img => `<img src="${img}" class="product-image" />`).join('')}
            </div>
            <div class="product-info">
              <div class="product-title">${card.productTitle}</div>
              <div class="product-meta">共 ${card.quantity} 件商品，总价 ¥${card.totalPrice}</div>
            </div>
          </div>
          <div class="aftersale-details">
            <div class="aftersale-row"><span class="aftersale-label">货物状态：</span><span class="aftersale-value">${card.goodsStatus}</span></div>
            <div class="aftersale-row"><span class="aftersale-label">退款原因：</span><span class="aftersale-value">${card.refundReason}</span></div>
            <div class="aftersale-row"><span class="aftersale-label">退款金额：</span><span class="aftersale-value">${card.refundAmount}</span></div>
            <div class="aftersale-row"><span class="aftersale-label">退款件数：</span><span class="aftersale-value">${card.refundQuantity}</span></div>
            <div class="aftersale-row"><span class="aftersale-label">补充描述：</span><span class="aftersale-value">${card.description || '-'}</span></div>
          </div>
          <div class="aftersale-card-footer">
            <button class="aftersale-cancel-btn" onclick="cancelAfterSale('${message.cardId}')">取消申请</button>
          </div>
        </div>
        <div class="aftersale-card-time">${message.time}</div>
      </div>
    `;
  }
  
  element.appendChild(messageElement);
}

/**
 * 滚动到聊天底部
 */
function scrollToBottom() {
  const element = document.getElementById('chatMessages');
  setTimeout(() => {
    element.scrollTop = element.scrollHeight;
  }, 60);
}

/**
 * 添加系统消息
 * @param {number} customerId - 客户ID
 * @param {string} text - 消息文本
 */
function addSystemMessage(customerId, text) {
  const customerState = systemState.customerStates[customerId];
  if (!customerState) return;
  
  const message = {
    type: 'system',
    text,
    time: getCurrentTime()
  };
  
  customerState.messages.push(message);
  
  if (systemState.activeCustomer === customerId) {
    addMessage(message);
    scrollToBottom();
  }
}
/**
 * 发送客户对话
 * @param {number} customerId - 客户ID
 */
function sendCustomerDialogue(customerId) {
  const customerState = systemState.customerStates[customerId];
  const customer = customers.find(c => c.id === customerId);
  
  if (!customer || !customerState || customerState.completed || customerState.awaitTransfer) return;
  
  if (customerState.dialogueIndex >= customer.dialogues.length) {
    completeCustomer(customerId);
    return;
  }
  
  const dialogue = customer.dialogues[customerState.dialogueIndex];
  
  // 条件分支：如果当前对话有conditionalMessages，根据命中的答案库和关键词选择消息
  let messages = dialogue.customerMessages;
  if (dialogue.conditionalMessages) {
    // 检查是否是基于答案库的条件消息
    if (customerState.hitAnswerBank) {
      const bankKey = 'bank' + customerState.hitAnswerBank;
      
      // 如果命中答案库一，需要进一步判断关键词
      if (customerState.hitAnswerBank === 1 && dialogue.conditionalKeywordsB) {
        // 获取客服回复内容，并转换为小写以实现不区分大小写的匹配
        const lastResponse = (customerState.lastAgentResponse || '').toLowerCase();
        
        // ========== 关键词判断优先级逻辑 ==========
        // 第一优先级：检测"偏酸"、"酸性"、"体质"、"性体"
        // 仅当未检测到第一优先级关键词时，才检测第二优先级关键词
        // 关键词匹配区分中英文标点符号，但不区分大小写
        
        // 第一优先级：检测体质相关关键词
        const priority1Keywords = dialogue.conditionalKeywordsB; // ['偏酸', '酸性', '体质', '性体']
        const hasPriority1Keyword = priority1Keywords.some(keyword => 
          lastResponse.includes(keyword.toLowerCase())
        );
        
        if (hasPriority1Keyword) {
          // 检测到第一优先级关键词（偏酸/酸性/体质/性体）
          // 触发bank1B分支：纠正伪科学，引用国家标准
          messages = dialogue.conditionalMessages[bankKey + 'B'] || dialogue.conditionalMessages[bankKey] || messages;
        } else if (dialogue.conditionalKeywords) {
          // 未检测到第一优先级关键词，进行第二优先级判断
          // 第二优先级：检测环境相关关键词（晒/潮湿/梅雨）
          const priority2Keywords = dialogue.conditionalKeywords; // ['晒', '潮湿', '梅雨']
          const hasPriority2Keyword = priority2Keywords.some(keyword => 
            lastResponse.includes(keyword.toLowerCase())
          );
          
          if (hasPriority2Keyword) {
            // 检测到第二优先级关键词（晒/潮湿/梅雨）
            // 触发bank1A分支：反驳存放不当指责，要求举证
            messages = dialogue.conditionalMessages[bankKey + 'A'] || dialogue.conditionalMessages[bankKey] || messages;
          } else {
            // 未检测到任何关键词，使用默认消息
            messages = dialogue.conditionalMessages[bankKey] || messages;
          }
        } else {
          // 没有配置第二优先级关键词，使用默认消息
          messages = dialogue.conditionalMessages[bankKey] || messages;
        }
      } else {
        // 其他答案库或没有二级关键词判断
        messages = dialogue.conditionalMessages[bankKey] || messages;
      }
    } else if (customerState.lastPass !== undefined) {
      // 传统的pass/fail条件分支
      const passMessages = dialogue.conditionalMessages.pass;
      if (customerState.lastPass) {
        // 如果pass是数组，随机选择一个；否则直接使用
        if (Array.isArray(passMessages) && Array.isArray(passMessages[0])) {
          // pass是嵌套数组，如 [[msg1,msg2], [msg3,msg4], [msg5,msg6]]
          // 随机选择一个话术库
          const randomIndex = Math.floor(Math.random() * passMessages.length);
          messages = passMessages[randomIndex];
        } else {
          // pass是普通数组或单个数组
          messages = passMessages;
        }
      } else {
        // 客服回复错误，从fail数组中随机选择一条追问话术发送
        const failMessages = dialogue.conditionalMessages.fail;
        if (Array.isArray(failMessages) && failMessages.length > 0) {
          // 随机选择一条追问话术
          const randomIndex = Math.floor(Math.random() * failMessages.length);
          messages = [failMessages[randomIndex]];
        } else {
          messages = failMessages || messages;
        }
      }
    }
  }
  
  // 基于关键词的条件发送：检查客服回复是否包含conditionalKeywords
  if (dialogue.conditionalKeywords && dialogue.conditionalKeywords.length > 0) {
    const lastResponse = customerState.lastAgentResponse || '';
    const hasConditionalKeyword = dialogue.conditionalKeywords.some(keyword => lastResponse.includes(keyword));
    
    // 如果客服回复包含关键词，检查是否需要移除条件消息
    if (hasConditionalKeyword) {
      // 条件满足，保持所有消息（包括条件消息）
      // 条件消息已在customerMessages的最后一条
    } else {
      // 条件不满足，移除最后一条条件消息
      if (messages.length > 1) {
        messages = messages.slice(0, -1);
      }
    }
  }
  
  sendMessageMessages(customerId, customer, dialogue, messages, 0);
}

/**
 * 发送消息序列
 * @param {number} customerId - 客户ID
 * @param {Object} customer - 客户对象
 * @param {Object} dialogue - 对话对象
 * @param {Array} messages - 消息数组
 * @param {number} index - 当前消息索引
 */
function sendMessageMessages(customerId, customer, dialogue, messages, index) {
  if (index >= messages.length) return;
  
  const text = messages[index];
  
  if (systemState.activeCustomer === customerId) {
    showTypingIndicator(customer, () => {
      const message = {
        type: 'customer',
        text,
        name: customer.name,
        avatar: customer.avatar,
        emotion: index === 0 ? dialogue.emotion : null,
        time: getCurrentTime()
      };
      
      systemState.customerStates[customerId].messages.push(message);
      addMessage(message);
      scrollToBottom();
      
      if (index < messages.length - 1) {
        setTimeout(() => {
          sendMessageMessages(customerId, customer, dialogue, messages, index + 1);
        }, 800);
      }
    });
  } else {
    setTimeout(() => {
      const message = {
        type: 'customer',
        text,
        name: customer.name,
        avatar: customer.avatar,
        emotion: index === 0 ? dialogue.emotion : null,
        time: getCurrentTime()
      };
      
      systemState.customerStates[customerId].messages.push(message);
      
      if (index < messages.length - 1) {
        setTimeout(() => {
          sendMessageMessages(customerId, customer, dialogue, messages, index + 1);
        }, 600);
      }
    }, 800);
  }
}

/**
 * 发送客服消息
 */
function sendMessage() {
  if (!systemState.on || systemState.end) return;
  
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  
  if (!text) return;
  
  if (!systemState.activeCustomer) {
    alert('请先选择客户');
    return;
  }
  
  const customerId = systemState.activeCustomer;
  const customerState = systemState.customerStates[customerId];
  const customer = customers.find(c => c.id === customerId);
  
  if (!customer || customerState.completed) return;
  
  if (customerState.awaitTransfer) {
    addSystemMessage(customerId, '⚠️ 请先点击右上角「🔀转接高级售后」按钮');
    input.value = '';
    return;
  }
  
  if (customerState.dialogueIndex >= customer.dialogues.length) return;
  
  const dialogue = customer.dialogues[customerState.dialogueIndex];
  
  // 检查消息质量
  const isAbusive = checkAbusiveLanguage(text);
  const isContradictory = !isAbusive && checkContradictoryLanguage(text, dialogue.standardAnswers);
  const responseQuality = checkResponseQuality(text, dialogue.keywords, dialogue.standardAnswers, dialogue.answerBanks);
  
  // 计算扣分
  let penalty = 0;
  let reason = '';
  
  if (isAbusive) {
    penalty = dialogue.penalty;
    reason = '辱骂性违规';
  } else if (isContradictory) {
    penalty = dialogue.penalty;
    reason = '语义相反';
  } else if (!responseQuality.pass) {
    if (responseQuality.similarity < 0.15) {
      penalty = dialogue.penalty;
      reason = '回复差异极大';
    } else if (responseQuality.similarity < 0.25) {
      penalty = Math.ceil(dialogue.penalty * 0.7);
      reason = '关键信息缺失';
    } else {
      penalty = Math.ceil(dialogue.penalty * 0.4);
      reason = '部分要点缺失';
    }
  }
  
  // 记录本轮是否通过（用于条件分支）
  const thisPass = (penalty === 0);
  if (dialogue.trackResult || (customerId === 5 && dialogue.conditionalMessages && Array.isArray(dialogue.conditionalMessages.pass) && Array.isArray(dialogue.conditionalMessages.pass[0]))) {
    // trackResult 为 true 或 陈晓梅的对话（有 conditionalMessages.pass 数组）时记录结果
    customerState.lastPass = thisPass;
  }
  
  // 处理扣分
  if (penalty > 0) {
    const module = systemState.scoringModules.find(m => m.id === dialogue.moduleId);
    if (module && module.score > 0) {
      const actualPenalty = Math.min(penalty, module.score);
      module.score -= actualPenalty;
      module.deductions.push({
        round: `${customer.name}-对话${customerState.dialogueIndex + 1}`,
        type: reason,
        value: actualPenalty
      });
      
      systemState.totalScore -= actualPenalty;
      // 生成更具体的违规描述
      let detailedDesc = '';
      if (reason === '回复差异极大') {
        detailedDesc = '回复内容与标准答案差异过大，未包含关键信息';
      } else if (reason === '关键信息缺失') {
        detailedDesc = '回复中缺少重要的关键信息点';
      } else if (reason === '部分要点缺失') {
        detailedDesc = '回复内容不完整，部分要点未提及';
      } else if (reason === '语义相反') {
        detailedDesc = '回复内容与标准答案语义相反';
      } else if (reason === '辱骂性违规') {
        detailedDesc = '回复中包含辱骂性语言';
      }
      
      systemState.violations.push({
        round: `${customer.name}-对话${customerState.dialogueIndex + 1}`,
        type: reason,
        desc: detailedDesc,
        value: actualPenalty
      });
      
      addStep('违规', `${customer.name}对话${customerState.dialogueIndex + 1}：${reason}（-${actualPenalty}分）`, 'done');
      penalty = actualPenalty;
    }
  }
  
  // 添加客服消息
  const agentMessage = {
    type: 'agent',
    text,
    time: getCurrentTime(),
    pen: penalty,
    pr: penalty > 0 ? reason : '',
    ab: isAbusive
  };
  
  // 保存客服回复内容，用于条件发送判断
  customerState.lastAgentResponse = text;
  
  // 保存命中的答案库信息，用于后续条件发送
  if (responseQuality.hitAnswerBank) {
    customerState.hitAnswerBank = responseQuality.hitAnswerBank;
  }
  
  customerState.messages.push(agentMessage);
  addMessage(agentMessage);
  scrollToBottom();
  
  input.value = '';
  updateTotalScore();
  updateViolationList();
  updateProgress();
  
  // 处理特殊情况
  if (isAbusive) {
    setTimeout(() => {
      const response = getRandomResponse(abusiveResponses);
      const customerMessage = {
        type: 'customer',
        text: response,
        name: customer.name,
        avatar: customer.avatar,
        emotion: 'extreme',
        time: getCurrentTime()
      };
      
      customerState.messages.push(customerMessage);
      
      if (systemState.activeCustomer === customerId) {
        addMessage(customerMessage);
        scrollToBottom();
      }
      
      addSystemMessage(customerId, '⚠️ 请重新回复。');
    }, 1500);
    return;
  }
  
  if (isContradictory) {
    setTimeout(() => {
      const response = getRandomResponse(contradictoryResponses);
      const customerMessage = {
        type: 'customer',
        text: response,
        name: customer.name,
        avatar: customer.avatar,
        emotion: 'angry',
        time: getCurrentTime()
      };
      
      customerState.messages.push(customerMessage);
      
      if (systemState.activeCustomer === customerId) {
        addMessage(customerMessage);
        scrollToBottom();
      }
      
      customerState.dialogueIndex++;
      
      setTimeout(() => {
        if (customerState.dialogueIndex >= customer.dialogues.length) {
          if (dialogue.isLastAndNeedTransfer) {
            startTransferWait(customerId, customer);
          } else {
            completeCustomer(customerId);
          }
        } else {
          sendCustomerDialogue(customerId);
        }
      }, 2000);
    }, 1500);
    return;
  }
  
  // 继续下一轮对话
  customerState.dialogueIndex++;
  
  if (dialogue.isLastAndNeedTransfer) {
    startTransferWait(customerId, customer);
    return;
  }
  
  if (customerState.dialogueIndex >= customer.dialogues.length) {
    setTimeout(() => completeCustomer(customerId), 1000);
  } else {
    setTimeout(() => sendCustomerDialogue(customerId), 1500);
  }
}
/**
 * 开始转接等待
 * @param {number} customerId - 客户ID
 * @param {Object} customer - 客户对象
 */
function startTransferWait(customerId, customer) {
  const customerState = systemState.customerStates[customerId];
  customerState.awaitTransfer = true;
  
  const transferButton = document.getElementById('transferBtn');
  if (systemState.activeCustomer === customerId) {
    transferButton.classList.add('pulse');
  }
  
  addSystemMessage(customerId, '⚠️ 请立即点击右上角「🔀转接高级售后」按钮！未操作将判定本通0分');
  
  systemState.transferTimers[customerId] = setTimeout(() => {
    if (customerState.awaitTransfer && !customerState.transferred) {
      customerState.awaitTransfer = false;
      transferButton.classList.remove('pulse');
      
      let totalDeduction = 0;
      customer.dialogues.forEach(dialogue => {
        const module = systemState.scoringModules.find(m => m.id === dialogue.moduleId);
        if (module && module.score > 0) {
          const actualPenalty = Math.min(dialogue.penalty, module.score);
          module.score -= actualPenalty;
          totalDeduction += actualPenalty;
          module.deductions.push({
            round: `${customer.name}`,
            type: '未执行转接',
            value: actualPenalty
          });
        }
      });
      
      if (totalDeduction > 0) {
        systemState.totalScore -= totalDeduction;
        systemState.violations.push({
          round: `${customer.name}`,
          type: '未执行转接',
          desc: '未在规定时间内点击转接按钮，违反流程规范',
          value: totalDeduction
        });
      }
      
      addStep('严重违规', `${customer.name}：未操作转接（-${totalDeduction}分）`, 'done');
      addSystemMessage(customerId, '❌ 未在规定时间内点击转接按钮，严重扣分！');
      
      updateTotalScore();
      updateViolationList();
      completeCustomer(customerId);
    }
  }, 15000);
}

/**
 * 完成客户对话
 * @param {number} customerId - 客户ID
 */
function completeCustomer(customerId) {
  const customerState = systemState.customerStates[customerId];
  if (customerState.completed) return;
  
  customerState.completed = true;
  systemState.completedCustomers.push(customerId);
  systemState.currentCustomers = systemState.currentCustomers.filter(id => id !== customerId);
  
  const element = document.getElementById(`customer-${customerId}`);
  if (element) {
    element.querySelector('.customer-status').className = 'customer-status status-completed';
    element.querySelector('.customer-status').textContent = '完成';
    element.classList.add('completed');
    element.classList.remove('active');
  }
  
  const customer = customers.find(c => c.id === customerId);
  addSystemMessage(customerId, `✅ ${customer.name}（${customer.scene}）对话完成`);
  
  if (systemState.activeCustomer === customerId) {
    updateChatHeader(customerId);
  }
  
  addStep('完成', `${customer.name}（${customer.scene}）`, 'done');
  
  if (systemState.completedCustomers.length >= customers.length) {
    completeTest();
    return;
  }
  
  // 确保始终保持两位客户同时服务
  const currentActiveCount = systemState.currentCustomers.length;
  const remainingCustomers = customers.length - systemState.nextCustomerIndex;
  const neededCustomers = 2 - currentActiveCount;
  
  if (remainingCustomers > 0 && neededCustomers > 0) {
    setTimeout(() => bringCustomers(neededCustomers), 1000);
  }
  
  if (systemState.currentCustomers.length > 0) {
    switchToCustomer(systemState.currentCustomers[0]);
  }
  
  updateProgress();
}

/**
 * 完成测试
 */
function completeTest() {
  systemState.end = true;
  systemState.endTime = new Date();
  
  document.getElementById('chatInput').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('transferBtn').disabled = true;
  
  addStep('测试完成', `总分：${systemState.totalScore}`, 'done');
  updateProgress();
  
  setTimeout(() => switchTab('report'), 1500);
}

function confirmTransfer() {

  const customerState = systemState.customerStates[customerId];
  const customer = customers.find(c => c.id === customerId);
  
  customerState.transferred = true;
  document.getElementById('transferBtn').classList.remove('pulse');
  
  if (systemState.transferTimers[customerId]) {
    clearTimeout(systemState.transferTimers[customerId]);
    delete systemState.transferTimers[customerId];
  }
  
  const transferMessage = {
    type: 'transfer',
    text: `会话已转接给「高级售后专员」— ${customer.name}的问题将由专员跟进`,
    time: getCurrentTime()

  customerState.messages.push(transferMessage);

    addMessage(transferMessage);
    scrollToBottom();
  }
  
  addStep('转接', `${customer.name} →高级售后`, 'done');
  
  if (customerState.awaitTransfer) {
    customerState.awaitTransfer = false;
    addSystemMessage(customerId, '✅ 转接操作已完成');
    setTimeout(() => completeCustomer(customerId), 1000);
  }
}

/**
 * 自定义搜索选择组件实例
 */
let refundSelectInstance = null;

/**
 * 自定义搜索选择组件类
 */
class CustomSelect {
  constructor(options) {
    this.container = document.getElementById(options.containerId);
    this.input = document.getElementById(options.inputId);
    this.searchInput = document.getElementById(options.searchId);
    this.optionsContainer = document.getElementById(options.optionsId);
    this.errorEl = document.getElementById(options.errorId);
    this.clearBtn = document.getElementById(options.clearId);
    this.options = options.options;
    this.filteredOptions = [...options.options];
    this.value = null;
    this.isOpen = false;
    this.highlightedIndex = 0;
    this.init();
  }

  init() {
    this.renderOptions();
    this.bindEvents();
  }

  renderOptions() {
    this.optionsContainer.innerHTML = '';
    
    if (this.filteredOptions.length === 0) {
      this.optionsContainer.innerHTML = '<div class="select-empty">无匹配的退款原因</div>';
      return;
    }

    this.filteredOptions.forEach((option, index) => {
      const optionEl = document.createElement('div');
      optionEl.className = 'select-option';
      optionEl.innerHTML = `
        <span>${option}</span>
        <svg class="select-option-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      `;
      optionEl.dataset.index = index;
      optionEl.dataset.value = option;
      
      if (this.value === option) {
        optionEl.classList.add('selected');
      }
      
      if (index === this.highlightedIndex) {
        optionEl.classList.add('highlighted');
      }

      optionEl.addEventListener('click', (e) => {
        e.stopPropagation();
        this.selectOption(option);
      });

      optionEl.addEventListener('mouseenter', () => {
        this.highlightedIndex = index;
        this.updateHighlight();
      });

      this.optionsContainer.appendChild(optionEl);
    });
  }

  bindEvents() {
    this.input.addEventListener('click', (e) => {
      e.stopPropagation();
      this.toggle();
    });

    this.searchInput.addEventListener('input', (e) => {
      this.filter(e.target.value);
    });

    this.searchInput.addEventListener('click', (e) => {
      e.stopPropagation();
    });

    this.input.addEventListener('keydown', (e) => this.handleKeydown(e));
    this.searchInput.addEventListener('keydown', (e) => this.handleKeydown(e));

    document.addEventListener('click', (e) => {
      if (this.isOpen && !this.container.contains(e.target)) {
        this.close();
      }
    });
  }

  handleKeydown(e) {
    switch (e.key) {
      case 'Enter':
      case ' ':
        e.preventDefault();
        if (this.isOpen) {
          if (this.highlightedIndex >= 0) {
            this.selectOption(this.filteredOptions[this.highlightedIndex]);
          }
        } else {
          this.open();
        }
        break;
      
      case 'Escape':
        if (this.isOpen) {
          this.close();
          e.stopPropagation();
        }
        break;
      
      case 'ArrowDown':
        if (!this.isOpen) {
          this.open();
        } else {
          e.preventDefault();
          this.highlightedIndex = Math.min(this.highlightedIndex + 1, this.filteredOptions.length - 1);
          this.updateHighlight();
          this.scrollToHighlighted();
        }
        break;
      
      case 'ArrowUp':
        if (this.isOpen) {
          e.preventDefault();
          this.highlightedIndex = Math.max(this.highlightedIndex - 1, 0);
          this.updateHighlight();
          this.scrollToHighlighted();
        }
        break;
      
      case 'Tab':
        if (this.isOpen) {
          this.close();
        }
        break;
    }
  }

  toggle() {
    if (this.isOpen) {
      this.close();
    } else {
      this.open();
    }
  }

  open() {
    this.isOpen = true;
    this.container.classList.add('open');
    this.searchInput.focus();
    this.searchInput.select();
    this.highlightedIndex = this.value ? this.filteredOptions.indexOf(this.value) : 0;
    this.updateHighlight();
  }

  close() {
    this.isOpen = false;
    this.container.classList.remove('open');
    this.highlightedIndex = -1;
    this.searchInput.value = '';
    this.filter('');
  }

  filter(searchTerm) {
    const term = searchTerm.toLowerCase();
    this.filteredOptions = this.options.filter(option => 
      option.toLowerCase().includes(term)
    );
    this.highlightedIndex = 0;
    this.renderOptions();
  }

  selectOption(option) {
    this.value = option;
    this.input.value = option;
    this.container.classList.add('has-value');
    this.setValid();
    this.close();
    this.input.focus();
    updateRefundReason(option);
  }

  clear() {
    this.value = null;
    this.input.value = '';
    this.container.classList.remove('has-value');
    this.filter('');
    this.renderOptions();
    updateRefundReason('');
  }

  updateHighlight() {
    const options = this.optionsContainer.querySelectorAll('.select-option');
    options.forEach((el, index) => {
      el.classList.remove('highlighted');
      if (index === this.highlightedIndex) {
        el.classList.add('highlighted');
      }
    });
  }

  scrollToHighlighted() {
    const highlighted = this.optionsContainer.querySelector('.highlighted');
    if (highlighted) {
      highlighted.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  setError() {
    this.container.classList.add('error');
    this.container.classList.remove('valid');
    if (this.errorEl) {
      this.errorEl.classList.add('show');
    }
  }

  setValid() {
    this.container.classList.remove('error');
    this.container.classList.add('valid');
    if (this.errorEl) {
      this.errorEl.classList.remove('show');
    }
  }

  reset() {
    this.clear();
    this.container.classList.remove('error', 'valid');
    if (this.errorEl) {
      this.errorEl.classList.remove('show');
    }
  }

  getValue() {
    return this.value;
  }
}

/**
 * 提交售后申请
 */
function submitAfterSale() {
  // 初始化组件（如果尚未初始化）
  initRefundSelect();
  
  // 验证退款原因
  if (!refundSelectInstance || !refundSelectInstance.getValue()) {
    if (refundSelectInstance) {
      refundSelectInstance.setError();
    }
    showToast('请选择退款原因', 'error');
    return;
  }
  
  // 清除错误状态
  if (refundSelectInstance) {
    refundSelectInstance.setValid();
  }
  
  // 获取订单信息
  const orderInfo = getCurrentOrderInfo();
  
  // 生成售后卡片
  const afterSaleCard = {
    productTitle: orderInfo.productTitle,
    quantity: orderInfo.quantity,
    totalPrice: orderInfo.totalPrice,
    images: orderInfo.images,
    goodsStatus: document.getElementById('goods-status')?.value || '已收到货',
    refundReason: refundSelectInstance.getValue(),
    refundAmount: document.getElementById('refund-amount')?.value || orderInfo.totalPrice,
    refundQuantity: document.getElementById('refund-quantity')?.value || orderInfo.quantity,
    description: document.getElementById('refund-desc')?.value || ''
  };
  
  // 发送售后卡片到聊天区域
  sendAfterSaleCard(afterSaleCard);
  
  showToast('售后申请卡片已发送');
  backToOrder();
}

  const cardId = 'aftersale-' + Date.now();
  
  const message = {
    type: 'aftersale',
    cardId: cardId,
    card: cardData,
    time: getCurrentTime()
  };
  
  // 添加到当前客户的消息列表
  const customerId = systemState.activeCustomer;
  if (customerId) {
    const customerState = systemState.customerStates[customerId];
    if (customerState) {
      customerState.messages.push(message);
    }
  }
  
  // 添加到聊天界面
  addMessage(message);
  scrollToBottom();

/**
 * 触发文件上传
 */
function triggerUpload() {
  if (window.uploadedFiles.length >= 4) {
    showToast('最多上传 4 张凭证图片');
    return;
  }
  document.getElementById('file-input').click();
}

/**
 * 处理文件上传
 * @param {Event} event - 上传事件
 */
function handleFileUpload(event) {
  var files = Array.from(event.target.files);
  var remaining = 4 - window.uploadedFiles.length;
  var toAdd = files.slice(0, remaining);
  toAdd.forEach(function(file) {
    window.uploadedFiles.push(file);
    var reader = new FileReader();
    reader.onload = function(e) {
      addPreview(e.target.result, window.uploadedFiles.length - 1);
      updateUploadUI();
    };
    reader.readAsDataURL(file);
  });
  if (files.length > remaining) showToast('最多上传 4 张凭证图片');
  event.target.value = '';
}

/**
 * 添加预览图片
 * @param {string} src - 图片源
 * @param {number} index - 图片索引
 */
function addPreview(src, index) {
  var area = document.getElementById('preview-area');
  var wrap = document.createElement('div');
  wrap.style.cssText = 'position:relative;width:120px;height:120px;border-radius:6px;overflow:hidden;border:1px solid #E5E5E5;flex-shrink:0;animation:previewIn .2s ease;';
  wrap.id = 'preview-' + index;
  var img = document.createElement('img');
  img.src = src;
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
  var del = document.createElement('div');
  del.innerHTML = '×';
  del.style.cssText = 'position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(0,0,0,0.55);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:background .15s,transform .15s;';
  del.onmouseenter = function() { this.style.background = 'rgba(0,0,0,0.8)'; this.style.transform = 'scale(1.1)'; };
  del.onmouseleave = function() { this.style.background = 'rgba(0,0,0,0.55)'; this.style.transform = 'scale(1)'; };
  del.onclick = function() { removePreview(index); };
  wrap.appendChild(img);
  wrap.appendChild(del);
  area.appendChild(wrap);
}

/**
 * 移除预览图片
 * @param {number} index - 图片索引
 */
function removePreview(index) {
  window.uploadedFiles.splice(index, 1);
  document.getElementById('preview-area').innerHTML = '';
  window.uploadedFiles.forEach(function(file, i) {
    var reader = new FileReader();
    reader.onload = function(e) { addPreview(e.target.result, i); };
    reader.readAsDataURL(file);
  });
  updateUploadUI();
}

/**
 * 更新上传UI
 */
function updateUploadUI() {
  var count = window.uploadedFiles.length;
  document.getElementById('upload-count').textContent = '(' + count + '/4)';
  document.getElementById('upload-box-main').style.display = count >= 4 ? 'none' : 'flex';
}

  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  if (window.toastTimer) clearTimeout(window.toastTimer);
  window.toastTimer = setTimeout(function() { toast.classList.remove('show'); }, 2200);
}

/**
 * 复制文本
 * @param {string} text - 要复制的文本
 */
function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() { showToast('已复制：' + text); });
  } else {
    var el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('已复制：' + text);
  }
}

/**

 * @param {string} inputId - 输入框ID
 * @param {string} errorId - 错误信息ID
 * @param {boolean} show - 是否显示错误
 */
function setInputError(inputId, errorId, show) {
  var input = document.getElementById(inputId);
  var error = document.getElementById(errorId);
  if (!input || !error) return;
  
  if (show) {
    input.classList.add('error');
    input.classList.remove('valid');
    error.classList.add('show');
  } else {
    input.classList.remove('error');
    error.classList.remove('show');
  }
}

/**

 * @param {string} inputId - 输入框ID

  var input = document.getElementById(inputId);
  if (!input) return;
  input.classList.add('valid');

}

/**
 * 验证手机号格式
 * @param {string} phone - 手机号
 * @returns {boolean}
 */
function validatePhone(phone) {
  var phoneRegex = /^1[3-9]\d{9}$/;
  return phoneRegex.test(phone);
}

/**
 * 验证金额格式
 * @param {string} amount - 金额
 * @returns {boolean}
 */
function validateAmount(amount) {
  var amountRegex = /^\d+(\.\d{1,2})?$/;
  return amountRegex.test(amount) && parseFloat(amount) > 0;
}

/**
 * 验证地址表单
 * @param {string} modalId - 模态框ID
 */
function validateAddressForm(modalId) {
  var nameInput = document.getElementById('address-name');
  var phoneInput = document.getElementById('address-phone');
  var addressInput = document.getElementById('address-detail');
  
  var isValid = true;
  
  // 验证姓名
  if (!nameInput.value.trim()) {
    setInputError('address-name', 'address-name-error', true);
    isValid = false;
  } else {
    setInputError('address-name', 'address-name-error', false);
    setInputValid('address-name');
  }
  
  // 验证电话
  if (!phoneInput.value.trim()) {
    setInputError('address-phone', 'address-phone-error', true);
    document.getElementById('address-phone-error').textContent = '请输入联系电话';
    isValid = false;
  } else if (!validatePhone(phoneInput.value)) {
    setInputError('address-phone', 'address-phone-error', true);
    document.getElementById('address-phone-error').textContent = '请输入有效的11位手机号';
    isValid = false;
  } else {
    setInputError('address-phone', 'address-phone-error', false);
    setInputValid('address-phone');
  }
  
  // 验证地址
  if (!addressInput.value.trim()) {
    setInputError('address-detail', 'address-detail-error', true);
    isValid = false;
  } else if (addressInput.value.trim().length < 5) {
    setInputError('address-detail', 'address-detail-error', true);
    document.getElementById('address-detail-error').textContent = '地址至少需要5个字符';
    isValid = false;
  } else {
    setInputError('address-detail', 'address-detail-error', false);
    setInputValid('address-detail');
  }
  
  // 全部验证通过
  if (isValid) {
    closeModalWithToast(modalId, '地址修改成功');
  }
}

/**
 * 验证打款表单
 * @param {string} modalId - 模态框ID
 */
function validatePaymentForm(modalId) {
  var amountInput = document.getElementById('payment-amount');
  var reasonInput = document.getElementById('payment-reason');

    isValid = false;
  } else {
    setInputError('payment-amount', 'payment-amount-error', false);

  if (!reasonInput.value.trim()) {

    isValid = false;
  } else {
    setInputError('payment-reason', 'payment-reason-error', false);

  }
  
  // 全部验证通过
  if (isValid) {
    closeModalWithToast(modalId, '打款申请已提交');

function initModalInputs(modalId) {

    if (!modal) return;
    
    var inputs = modal.querySelectorAll('.form-input');
    inputs.forEach(function(input) {
      // 输入时清除错误状态
      input.addEventListener('input', function() {
        var errorEl = document.getElementById(input.id + '-error');
        if (errorEl) {
          input.classList.remove('error');
          errorEl.classList.remove('show');
        }
      });
      
      // 焦点时聚焦样式
      input.addEventListener('focus', function() {
        // 样式已通过CSS处理
      });
      
      // 键盘事件 - Enter键提交表单
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          if (modalId === 'modal-address') {
            validateAddressForm(modalId);
          } else if (modalId === 'modal-payment') {
            validatePaymentForm(modalId);
          }
        }
      });
    });
    
    // 自动聚焦到第一个输入框
    var firstInput = inputs[0];
    if (firstInput) {
      firstInput.focus();
    }
  }, 250);
}

/**
 * 切换弹出菜单
 * @param {string} id - 弹出菜单ID
 */
function togglePopover(id) {
  var el = document.getElementById(id);
  var isShow = el.classList.contains('show');
  document.querySelectorAll('.popover-menu').forEach(function(p) { p.classList.remove('show'); });
  if (!isShow) {
    el.classList.add('show');
    setTimeout(function() {
      document.addEventListener('click', closePopoverOutside);
    }, 0);
  }
}

/**
 * 点击外部关闭弹出菜单
 * @param {Event} e - 点击事件
 */
function closePopoverOutside(e) {
  if (!e.target.closest('.popover-wrapper')) {
    document.querySelectorAll('.popover-menu').forEach(function(p) { p.classList.remove('show'); });
    document.removeEventListener('click', closePopoverOutside);
  }
}

/**
 * 更新分数面板
 */
function updateScorePanel() {
  const scoreCircle = document.getElementById('scoreCircle');
  const scoreCircleValue = document.getElementById('scoreCircleValue');
  const scoreSummaryTitle = document.getElementById('scoreSummaryTitle');
  const scoreSummaryDesc = document.getElementById('scoreSummaryDesc');
  
  if (!systemState.on) {
    scoreCircle.className = 'score-circle pending';
    scoreCircleValue.textContent = '—';
    scoreSummaryTitle.textContent = '等待测试开始';
    scoreSummaryDesc.textContent = '';
    return;
  }
  
  scoreCircleValue.textContent = systemState.totalScore;
  
  if (systemState.totalScore >= 80) {
    scoreCircle.className = 'score-circle pass';
    scoreSummaryTitle.textContent = '✅ 合格';
    scoreSummaryDesc.textContent = `总分 ${systemState.totalScore}`;
  } else {
    scoreCircle.className = 'score-circle fail';
    scoreSummaryTitle.textContent = '❌ 待改进';
    scoreSummaryDesc.textContent = `总分 ${systemState.totalScore}`;
  }
  
  document.getElementById('scoreModules').innerHTML = systemState.scoringModules.map(module => {
    const rate = (module.score / module.maxScore * 100).toFixed(0);
    let rateColor = 'var(--success)';
    let rateLevel = '优秀';
    
    if (rate < 60) {
      rateColor = 'var(--danger)';
      rateLevel = '待提升';
    } else if (rate < 80) {
      rateColor = 'var(--warning)';
      rateLevel = '合格';
    }
    
    const deductionHtml = module.deductions.length === 0 ? 
      '<div class="no-deduction">✅ 无扣分</div>' : 
      module.deductions.map(deduction => `
        <div class="deduction-item">
          <span>${deduction.round}：${deduction.type}</span>
          <span style="color:var(--danger);font-weight:600">-${deduction.value}</span>
        </div>
      `).join('');
    
    return `
      <div class="score-module-card">
        <div class="module-header">
          <span class="module-name">${module.name}</span>
          <span class="module-score" style="color:${rateColor}">
            ${module.score}<span style="font-size:12px;color:var(--gray-400)">/${module.maxScore}</span>
          </span>
        </div>
        <div class="module-progress">
          <div class="module-progress-fill" style="width:${rate}%;background:${rateColor}"></div>
        </div>
        <div class="module-rate">
          ${rate}%·<span class="rating-badge ${rate >= 80 ? 'rating-excellent' : rate >= 60 ? 'rating-pass' : 'rating-fail'}">${rateLevel}</span>
        </div>
        <div class="module-deductions">
          ${deductionHtml}
        </div>
      </div>
    `;
  }).join('');
}

/**
 * 更新报告面板
 */
function updateReportPanel() {
  const element = document.getElementById('reportContent');
  
  if (!systemState.end) {
    element.innerHTML = `
      <div class="report-not-ready">
        <div class="icon">📋</div>
        <h3>报告尚未生成</h3>
        <p>完成全部客户对话后自动生成</p>
      </div>
    `;
    return;
  }
  
  const duration = Math.round((systemState.endTime - systemState.startTime) / 1000);
  const minutes = Math.floor(duration / 60);
  const seconds = duration % 60;
  
  const conclusion = systemState.totalScore >= 80 ? '✅ 合格' : '❌ 待改进';
  const conclusionClass = systemState.totalScore >= 80 ? 'rating-excellent' : 'rating-fail';
  
  const rows = systemState.scoringModules.map((module, index) => {
    const rate = (module.score / module.maxScore * 100).toFixed(0);
    let rateLevel = '优秀';
    let rateClass = 'rating-excellent';
    
    if (rate < 60) {
      rateLevel = '待提升';
      rateClass = 'rating-fail';
    } else if (rate < 80) {
      rateLevel = '合格';
      rateClass = 'rating-pass';
    }
    
    const deductionSummary = module.deductions.length === 0 ? 
      '无扣分' : 
      module.deductions.map(deduction => `${deduction.round} ${deduction.type}(-${deduction.value})`).join('；');
    
    return `
      <tr>
        <td>${index + 1}</td>
        <td>${module.name}</td>
        <td>${module.maxScore}</td>
        <td>${module.score}</td>
        <td>${rate}%</td>
        <td style="max-width:200px;font-size:11px">${deductionSummary}</td>
        <td><span class="rating-badge ${rateClass}">${rateLevel}</span></td>
      </tr>
    `;
  }).join('');
  
  const suggestionMap = {
    greeting: '加强开场问候。',
    problem: '提升问题确认。',
    solution: '加强方案提供。',
    communication: '优化沟通技巧。',
    process: '强化流程规范。',
    closing: '优化结束语。'
  };
  
  const lowScoreModules = systemState.scoringModules.filter(module => (module.score / module.maxScore) < 0.8);
  const suggestionHtml = lowScoreModules.length === 0 ? 
    '<div style="text-align:center;padding:20px;color:var(--success)">✅ 表现优秀</div>' : 
    '<div class="suggestion-cards">' + 
    lowScoreModules.map(module => `
      <div class="suggestion-card">
        <h4>📌 ${module.name}（${(module.score / module.maxScore * 100).toFixed(0)}%）</h4>
        <p>${suggestionMap[module.id] || ''}</p>
      </div>
    `).join('') + 
    '</div>';
  
  element.innerHTML = `
    <div class="report-container" id="rpa">
      <div class="report-header">
        <h2>🌿 草本初色 · 客服岗前测试报告</h2>
        <p>祈愿工作室· 标准化考核</p>
      </div>
      <div class="report-body">
        <div class="report-info-grid">
          <div class="report-info-item">
            <div class="report-info-label">被测人员</div>
            <div class="report-info-value">${systemState.agentName}</div>
          </div>
          <div class="report-info-item">
            <div class="report-info-label">测试时间</div>
            <div class="report-info-value">${systemState.startTime.toLocaleString('zh-CN')}</div>
          </div>
          <div class="report-info-item">
            <div class="report-info-label">总用时</div>
            <div class="report-info-value">${minutes}分${seconds}秒</div>
          </div>
          <div class="report-info-item">
            <div class="report-info-label">结论</div>
            <div class="report-info-value">
              <span class="rating-badge ${conclusionClass}" style="font-size:14px;padding:4px 14px">${conclusion}</span>
            </div>
          </div>
        </div>
        <h3 style="font-size:15px;margin-bottom:12px">📊 评分明细</h3>
        <table class="report-table">
          <thead>
            <tr>
              <th>#</th>
              <th>维度</th>
              <th>满分</th>
              <th>得分</th>
              <th>得分率</th>
              <th>扣分摘要</th>
              <th>评级</th>
            </tr>
          </thead>
          <tbody>
            ${rows}
            <tr>
              <td colspan="2"><strong>汇总</strong></td>
              <td><strong>100</strong></td>
              <td><strong>${systemState.totalScore}</strong></td>
              <td><strong>${systemState.totalScore}%</strong></td>
              <td></td>
              <td><span class="rating-badge ${conclusionClass}">${conclusion}</span></td>
            </tr>
          </tbody>
        </table>
        <h3 style="font-size:15px;margin-bottom:12px">💡 改进建议</h3>
        ${suggestionHtml}
      </div>
      <div class="report-actions">
        <button class="btn btn-primary" onclick="downloadReport()" style="width:auto">📥 下载</button>
        <button class="btn btn-outline" onclick="window.print()" style="width:auto">🖨️ 打印</button>
      </div>
    </div>
  `;
}

/**
 * 下载报告
 */
function downloadReport() {
  const reportElement = document.getElementById('rpa');
  const styleContent = document.querySelector('style').textContent;
  
  const html = `
    <!DOCTYPE html>
    <html lang="zh-CN">
    <head>
      <meta charset="UTF-8">
      <title>报告-${systemState.agentName}</title>
      <style>
        ${styleContent}
        body {
          background: #f5f5f5;
          padding: 20px;
        }
        .report-container {
          max-width: 900px;
          margin: 0 auto;
        }
        .report-actions {
          display: none;
        }
      </style>
    </head>
    <body>
      ${reportElement.outerHTML}
    </body>
    </html>
  `;
  
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  
  link.href = url;
  link.download = `测试报告_${systemState.agentName}.html`;
  link.click();
  
  URL.revokeObjectURL(url);
}
